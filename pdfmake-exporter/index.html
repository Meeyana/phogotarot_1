<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phở Gõ Tarot PDF Exporter</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #667085;
        --gold: #c7972f;
        --paper: #fffaf0;
        --navy: #0b132b;
        font-family: Arial, sans-serif;
      }

      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #ece6d8;
        color: var(--ink);
      }

      main {
        width: min(720px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid rgba(199, 151, 47, 0.35);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: 0 18px 50px rgba(23, 32, 51, 0.14);
      }

      h1 {
        margin: 0 0 8px;
        color: var(--navy);
        font-size: 24px;
        line-height: 1.25;
      }

      p { margin: 0 0 18px; color: var(--muted); line-height: 1.6; }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        min-height: 42px;
        border: 1px solid rgba(23, 32, 51, 0.16);
        border-radius: 6px;
        padding: 0 14px;
        background: #fff;
        color: var(--ink);
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--gold);
        background: var(--gold);
        color: #111827;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      textarea {
        width: 100%;
        min-height: 170px;
        margin: 12px 0;
        padding: 12px;
        border: 1px solid rgba(23, 32, 51, 0.16);
        border-radius: 6px;
        font: 13px/1.45 Consolas, monospace;
        resize: vertical;
      }

      .status {
        min-height: 22px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Phở Gõ Tarot PDF Exporter</h1>
      <p>
        App này nhận dữ liệu báo cáo từ trang thần số học hiện tại, rồi tạo PDF thật bằng pdfmake.
        Không dùng Browser Run, không dùng window.print.
      </p>
      <textarea id="payload" placeholder="Dán report JSON để test, hoặc mở trang này bằng bridge từ website chính."></textarea>
      <div class="actions">
        <button class="primary" id="download">Tải PDF</button>
        <button id="open">Mở PDF</button>
        <button id="clear">Xóa dữ liệu test</button>
      </div>
      <div class="status" id="status">Đang chờ dữ liệu report...</div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
